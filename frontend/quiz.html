<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — PlacementPrep</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-pp">
    <div class="container">
        <a class="navbar-brand brand" href="dashboard.html">PlacementPrep</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted-pp small d-none d-md-inline">Category: <strong id="quizCategoryLabel"></strong></span>
            <span class="timer-pill" id="timerDisplay">00:00</span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="progress-pp mb-4">
        <div class="progress-pp-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="row g-4">
        <div class="col-md-9">
            <div class="card-pp card-pp-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fw-semibold text-muted-pp" id="questionNumber">Question 1</span>
                    <button class="btn btn-sm btn-pp-outline" id="bookmarkBtn">🔖 Bookmark</button>
                </div>
                <h5 class="mb-4" id="questionText">Loading question...</h5>
                <div id="optionsContainer"></div>

                <div class="d-flex justify-content-between mt-4">
                    <button class="btn btn-pp-outline" id="prevBtn">← Previous</button>
                    <div>
                        <button class="btn btn-pp-outline me-2" id="skipBtn">Skip</button>
                        <button class="btn btn-pp-primary" id="nextBtn">Next →</button>
                        <button class="btn btn-pp-primary" id="submitBtn" style="display:none;">Submit Quiz</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-pp card-pp-body">
                <h6 class="mb-3">Question Palette</h6>
                <div class="d-flex flex-wrap gap-2" id="questionPalette"></div>
                <hr>
                <div class="small text-muted-pp">
                    <div><span class="palette-btn answered d-inline-block" style="width:16px;height:16px;padding:0;"></span> Answered</div>
                    <div><span class="palette-btn skipped d-inline-block" style="width:16px;height:16px;padding:0;"></span> Skipped</div>
                    <div><span class="palette-btn d-inline-block" style="width:16px;height:16px;padding:0;"></span> Not visited</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
