<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PlacementPrep</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="index.html" class="brand text-primary fs-4">PlacementPrep</a>
            <h4 class="mt-3 mb-1">Welcome back</h4>
            <p class="text-muted-pp">Login to continue your practice</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control form-control-pp" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control form-control-pp" required>
            </div>
            <div class="d-flex justify-content-between mb-3 small">
                <label class="d-flex align-items-center gap-2">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="#" class="text-primary" onclick="alert('Password reset link would be emailed to you. (Wire this up to a real /api/auth/forgot-password endpoint.)')">Forgot password?</a>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-pp-primary w-100">Login</button>
        </form>

        <p class="text-center text-muted-pp mt-4 mb-0">
            Don't have an account? <a href="register.html" class="text-primary fw-semibold">Register</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
