# ==============================
# Server Configuration
# ==============================
server.port=8080

# ==============================
# MySQL Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/placementprep_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration
# ==============================
# 256-bit secret used to sign JWT tokens. Change this in production and keep it out of source control.
app.jwt.secret=ChangeThisToALongRandomSecretKeyForPlacementPrepJWTSigning2026
app.jwt.expiration-ms=86400000

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500

# ==============================
# File Upload (profile photos)
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
